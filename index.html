<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>skillCI — Continuous Integration for Agent Skills</title>
<meta name="description" content="Collect skills from across your repos, validate them against org standards, and ship them to your team's agent tools.">
<link rel="icon" type="image/png" href="assets/ckillCI-icon-round.png">
<meta property="og:title" content="skillCI — Continuous Integration for Agent Skills">
<meta property="og:description" content="Collect skills from across your repos, validate them against org standards, and ship them to your team's agent tools.">
<meta property="og:image" content="https://skillci.com/assets/skillCI-icon-square.png">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">
<meta name="twitter:site" content="@getskillCI">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg-deep: #060a11;
  --bg-base: #0a0f1a;
  --bg-surface: #111a2e;
  --border: rgba(106, 215, 87, 0.08);
  --border-active: rgba(106, 215, 87, 0.3);
  --green: #6AD757;
  --green-dim: #5abc48;
  --green-glow: rgba(106, 215, 87, 0.15);
  --cyan: #4ec93e;
  --text-primary: #e8f0ec;
  --text-secondary: #7a8f85;
  --text-muted: #4a5f55;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'Outfit', sans-serif;
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg-deep);
  color: var(--text-primary);
  font-family: var(--sans);
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

.bg-grid {
  position: fixed;
  inset: 0;
  z-index: 0;
  background-image:
    linear-gradient(rgba(106, 215, 87, 0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(106, 215, 87, 0.02) 1px, transparent 1px);
  background-size: 60px 60px;
  mask-image: radial-gradient(ellipse 80% 60% at 50% 50%, black 20%, transparent 70%);
}

.bg-glow {
  position: fixed;
  width: 800px;
  height: 800px;
  border-radius: 50%;
  filter: blur(150px);
  opacity: 0.07;
  z-index: 0;
  pointer-events: none;
  top: -300px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--green);
}

.page { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; }
.container { width: 100%; max-width: 1100px; margin: 0 auto; padding: 0 24px; }

/* ---- Header ---- */
.header {
  padding: 28px 0;
  opacity: 0;
  animation: fadeDown 0.6s ease forwards;
}

.header__inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.logo {
  display: flex;
  align-items: center;
  text-decoration: none;
}

.logo__svg {
  height: 22px;
  width: auto;
}

.header__badge {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 500;
  color: var(--green);
  background: var(--green-glow);
  border: 1px solid rgba(106, 215, 87, 0.15);
  padding: 5px 12px;
  border-radius: 20px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

/* ---- Hero ---- */
.hero {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 60px 0 40px;
}

.hero__content {
  width: 100%;
  text-align: center;
}

.hero__title {
  font-family: var(--sans);
  font-size: clamp(36px, 5.5vw, 68px);
  font-weight: 800;
  line-height: 1.08;
  letter-spacing: -0.035em;
  margin-bottom: 24px;
  opacity: 0;
  animation: fadeUp 0.7s ease 0.2s forwards;
}

.hero__title em {
  font-style: normal;
  color: var(--green);
}

.hero__desc {
  font-size: 18px;
  line-height: 1.65;
  color: var(--text-secondary);
  max-width: 560px;
  margin: 0 auto 48px;
  font-weight: 400;
  opacity: 0;
  animation: fadeUp 0.7s ease 0.35s forwards;
}

/* ---- CTA ---- */
.cta {
  text-align: center;
  opacity: 0;
  animation: fadeUp 0.8s ease 0.5s forwards;
}

.cta__label {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 16px;
}

.cta__form {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  max-width: 440px;
  margin: 0 auto;
}

.cta__input {
  flex: 1;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 18px;
  font-family: var(--mono);
  font-size: 14px;
  color: var(--text-primary);
  outline: none;
  transition: border-color 0.3s ease, box-shadow 0.3s ease;
}

.cta__input::placeholder { color: var(--text-muted); }

.cta__input:focus {
  border-color: var(--border-active);
  box-shadow: 0 0 0 3px var(--green-glow);
}

.cta__btn {
  background: linear-gradient(135deg, var(--green), var(--cyan));
  color: var(--bg-deep);
  font-family: var(--mono);
  font-size: 14px;
  font-weight: 600;
  padding: 14px 24px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  white-space: nowrap;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
  letter-spacing: 0.01em;
}

.cta__btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 24px var(--green-glow);
}

.cta__btn:active {
  transform: translateY(0);
}

.cta__note {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 14px;
}

/* ---- Footer ---- */
.footer {
  padding: 40px 0;
  text-align: center;
  border-top: 1px solid var(--border);
  margin-top: auto;
  opacity: 0;
  animation: fadeUp 0.6s ease 0.65s forwards;
}

.footer__inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.footer__copy {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text-muted);
}

.footer__link {
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--text-muted);
  text-decoration: none;
  font-family: var(--mono);
  font-size: 12px;
  transition: color 0.2s ease;
}

.footer__link:hover { color: var(--text-primary); }

.footer__link svg {
  width: 16px;
  height: 16px;
  fill: currentColor;
}

/* ---- Animations ---- */
@keyframes fadeDown {
  from { opacity: 0; transform: translateY(-12px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ---- Responsive ---- */
@media (max-width: 700px) {
  .hero { padding: 40px 0 24px; }
  .hero__desc { font-size: 16px; }

  .cta__form {
    flex-direction: column;
  }

  .cta__input, .cta__btn { width: 100%; }

  .footer__inner {
    flex-direction: column;
    gap: 16px;
  }
}
</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-glow"></div>

<div class="page">
  <header class="header">
    <div class="container">
      <div class="header__inner">
        <a href="/" class="logo">
          <img src="assets/wordmark.svg" alt="skillCI" class="logo__svg">
        </a>
        <div class="header__badge">Coming Soon</div>
      </div>
    </div>
  </header>

  <main class="hero">
    <div class="container">
      <div class="hero__content">
        <h1 class="hero__title">Continuous integration<br>for <em>agent skills</em></h1>
        <p class="hero__desc">Collect skills from across your repos, validate them against org standards, and ship them to your team's agent tools.</p>

        <div class="cta">
          <p class="cta__label">Get early access</p>
          <form class="cta__form" id="ctaForm" action="https://formspree.io/f/meelbeqv" method="POST">
            <input type="email" name="email" class="cta__input" placeholder="you@company.com" required aria-label="Email address">
            <button type="submit" class="cta__btn" id="ctaBtn">Notify Me</button>
          </form>
          <p class="cta__note">No spam. We'll reach out when it's your turn.</p>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer__inner">
        <span class="footer__copy">&copy; 2026 skillCI</span>
        <a href="https://x.com/getskillCI" target="_blank" rel="noopener noreferrer" class="footer__link">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
          @getskillCI
        </a>
      </div>
    </div>
  </footer>
</div>

<script>
(function() {
  var form = document.getElementById('ctaForm');
  var btn = document.getElementById('ctaBtn');

  form.addEventListener('submit', function(e) {
    e.preventDefault();
    var input = form.querySelector('input');
    if (!input.value || !input.checkValidity()) return;

    btn.textContent = 'Sending...';
    btn.disabled = true;

    fetch(form.action, {
      method: 'POST',
      headers: { 'Accept': 'application/json' },
      body: new FormData(form)
    }).then(function(res) {
      if (res.ok) {
        btn.textContent = 'You\'re in \u2713';
        btn.style.pointerEvents = 'none';
        btn.style.opacity = '0.8';
        input.disabled = true;
        input.style.opacity = '0.5';
      } else {
        btn.textContent = 'Try again';
        btn.disabled = false;
      }
    }).catch(function() {
      btn.textContent = 'Try again';
      btn.disabled = false;
    });
  });
})();
</script>
</body>
</html>
